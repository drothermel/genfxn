<style>
  :root {
    --bg: #0e0e12;
    --surface: #18181f;

    --border: #2a2a35;
    --text: #e4e4eb;
    --text-muted: #8888a0;

    --accent-abstract: #a78bfa;
    --accent-op: #60a5fa;

    height: 100vh;
    width: 100vw;
  }

  /* Top bar */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    z-index: 100;
    gap: 16px;
  }
  .topbar h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }
  .topbar h1 span { color: var(--text-muted); font-weight: 400; }

  /* Legend */
  .legend {
    display: flex;
    gap: 14px;
    align-items: center;
    margin-left: auto;
    font-size: 11px;
    color: var(--text-muted);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.2s;
  }
  .legend-item.dimmed { opacity: 0.3; }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 50%;

  .legend-line {
    width: 20px; height: 2px;
    border-radius: 1px;
  }
  .legend-line.dashed {
    background: none;
    border-top: 2px dashed;
  }

  /* Canvas area */
  #canvas-container {
    position: fixed;
    top: 48px; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    cursor: grab;
  }
  #canvas-container.dragging { cursor: grabbing; }
  #canvas {
    position: absolute;
    transform-origin: 0 0;
  }

  /* Nodes */
  .node {
    position: absolute;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .node:hover {
    border-color: var(--text-muted);
    box-shadow: 0 0 20px rgba(255,255,255,0.04);
  }
  .node.dragging {
    z-index: 50;
    box-shadow: 0 0 30px rgba(255,255,255,0.08);
    cursor: grabbing;
  }
  .node.selected {
    border-color: var(--accent-protocol);
    box-shadow: 0 0 24px rgba(110,231,183,0.12);
  }
  .node.dimmed { opacity: 0.12; }
  .node-header {
    padding: 8px 12px 6px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .node-badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 2px 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.06);
    white-space: nowrap;
  }
  .node-name {
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
  }
  .node-body {
    padding: 6px 12px 8px;
    font-size: 10.5px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .node-field {
    display: flex;
    gap: 6px;
    align-items: baseline;
  }
  .field-name {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-muted);
  }
  .field-type {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent-protocol);
  }

  /* SVG edges */
  svg.edges {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    overflow: visible;
  }
  svg.edges path {
    fill: none;
    stroke-width: 1.5;
    transition: opacity 0.2s;
  }
  svg.edges path.dimmed { opacity: 0.05; }
  svg.edges .edge-inherits { stroke: var(--edge-inherits); }
  svg.edges .edge-composes { stroke: var(--edge-composes); }
  svg.edges .edge-uses { stroke: var(--edge-uses); stroke-dasharray: 4 3; }
  svg.edges .edge-registers { stroke: var(--accent-registry); stroke-dasharray: 6 3; }

  /* Detail panel */
  .detail-panel {
    position: fixed;
    right: -380px;
    top: 48px;
    bottom: 0;
    width: 360px;
    background: var(--surface);
    border-left: 1px solid var(--border);

  .detail-panel .detail-kind {

    margin-bottom: 14px;
  }
  .detail-panel .detail-desc {

    color: var(--text);
    margin-bottom: 16px;
  }
  .detail-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 14px 0 6px;
  }
  .detail-field-row {
    display: flex;
    gap: 8px;
    align-items: baseline;
    padding: 3px 0;
    font-family: var(--font-mono);
    font-size: 11px;

  .detail-field-row .fname { color: var(--text); }

  .detail-rel-row {

    font-size: 11.5px;

    gap: 6px;
    align-items: center;

  }
  .detail-rel-row:hover { color: var(--accent-protocol); }
  .rel-arrow { color: var(--text-muted); font-size: 10px; }
  .detail-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    line-height: 1;
  }
  .detail-close:hover { color: var(--text); }
  .detail-file {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--text-muted);
    background: rgba(255,255,255,0.04);

    border-radius: 4px;

    margin-bottom: 10px;
  }

  /* Zoom controls */
  .zoom-controls {
    position: fixed;
    bottom: 16px; left: 16px;

    gap: 4px;

    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .zoom-btn:hover { background: var(--surface-hover); color: var(--text); }
</style>

  // Inheritance

  ["TabStrOp", "BaseOp", "inherits"],

  ["AsciiCharSpace", "CategoricalSpace", "inherits"],
  ["CharStyleTransformSpace", "CategoricalSpace", "inherits"],
  ["SimpleStrTransformSpace", "CategoricalSpace", "inherits"],
  ["SimpleStringInputSpace", "StringSpace", "inherits"],

  // Composition (field type)
  ["BaseOp", "Space", "composes"],
  ["StringSpace", "UniformIntSpace", "composes"],
  ["StringSpace", "AsciiCharSpace", "composes"],
  ["SimpleStringInputSpace", "UniformIntSpace", "composes"],
  ["SimpleStringInputSpace", "CategoricalSpace", "composes"],
  ["SimpleStringInputSpace", "MixtureOp", "composes"],
  ["SimpleStrTransformOp", "SimpleStrTransformSpace", "composes"],
  ["SimpleStrTransformOp", "StringSpace", "composes"],
  ["CharStyleTransformOp", "CharStyleTransformSpace", "composes"],
  ["CharStyleTransformOp", "CategoricalSpace", "composes"],

  // Uses (function call / import dependency)
  ["MixtureOp", "OP_REGISTRY", "uses"],
  ["UpperStrOp", "str_templates", "uses"],
  ["LowerStrOp", "str_templates", "uses"],
  ["CapitalizeStrOp", "str_templates", "uses"],
  ["SwapcaseStrOp", "str_templates", "uses"],
  ["TitleStrOp", "str_templates", "uses"],
  ["CasefoldStrOp", "str_templates", "uses"],
  ["ReverseStrOp", "str_templates", "uses"],
  ["StripStrOp", "str_templates", "uses"],
  ["LstripStrOp", "str_templates", "uses"],
  ["RstripStrOp", "str_templates", "uses"],
  ["TabStrOp", "str_templates", "uses"],
  ["ExpandtabsStrOp", "str_templates", "uses"],
  ["BaseOp", "types", "uses"],
  ["SimpleStrTransformOp", "types", "uses"],
  ["CharStyleTransformOp", "types", "uses"],
  ["StringSpace", "AsciiCharSpace", "uses"],
  ["SimpleStringInputSpace", "AsciiCharSpace", "uses"],

  // Registry edges
  ["OP_REGISTRY", "STRING_OP_REGISTRY", "registers"],
  ["OP_REGISTRY", "MixtureOp", "registers"],
  ["STRING_OP_REGISTRY", "UpperStrOp", "registers"],
  ["STRING_OP_REGISTRY", "LowerStrOp", "registers"],
  ["STRING_OP_REGISTRY", "CapitalizeStrOp", "registers"],
  ["STRING_OP_REGISTRY", "SwapcaseStrOp", "registers"],
  ["STRING_OP_REGISTRY", "TitleStrOp", "registers"],
  ["STRING_OP_REGISTRY", "CasefoldStrOp", "registers"],
  ["STRING_OP_REGISTRY", "ReverseStrOp", "registers"],
  ["STRING_OP_REGISTRY", "StripStrOp", "registers"],
  ["STRING_OP_REGISTRY", "LstripStrOp", "registers"],
  ["STRING_OP_REGISTRY", "RstripStrOp", "registers"],
  ["STRING_OP_REGISTRY", "TabStrOp", "registers"],
  ["STRING_OP_REGISTRY", "ExpandtabsStrOp", "registers"],
];

// ─── RENDERING ───────────────────────────────────────────────────
const canvas = document.getElementById("canvas");
const svgEdges = document.getElementById("edges");
const container = document.getElementById("canvas-container");
const detailPanel = document.getElementById("detail-panel");
const detailContent = document.getElementById("detail-content");
const detailClose = document.getElementById("detail-close");

let selectedNode = null;
let activeFilters = new Set();

// Build node elements
const nodeEls = {};
nodes.forEach(n => {
  const el = document.createElement("div");
  el.className = "node";
  el.dataset.id = n.id;
  el.style.left = n.x + "px";
  el.style.top = n.y + "px";
  if (n.w) el.style.width = n.w + "px";

  let fieldsHtml = "";
  if (n.fields.length > 0) {
    fieldsHtml = '<div class="node-body">' +
      n.fields.slice(0, 3).map(f =>
        `<div class="node-field"><span class="field-name">${f.name}</span><span class="field-type">${f.type}</span></div>`
      ).join("") +
      (n.fields.length > 3 ? `<div class="node-field"><span class="field-name" style="color:var(--text-muted)">+${n.fields.length - 3} more</span></div>` : "") +
    '</div>';
  }

  el.innerHTML = `
    <div class="node-header">
      <span class="node-badge" style="color:${n.color};border:1px solid ${n.color}30">${n.badge}</span>
      <span class="node-name" style="color:${n.color}">${n.id}</span>
    </div>
    ${fieldsHtml}
  `;

  // Drag + click handling is done globally below
  canvas.appendChild(el);
  nodeEls[n.id] = el;
});

function getNodeCenter(id) {
  const el = nodeEls[id];
  if (!el) return { x: 0, y: 0 };
  const n = nodes.find(n => n.id === id);
  const rect = el.getBoundingClientRect();
  const w = el.offsetWidth;
  const h = el.offsetHeight;
  return { x: n.x + w / 2, y: n.y + h / 2, w, h, left: n.x, top: n.y };
}

function getEdgePoints(fromId, toId) {
  const f = getNodeCenter(fromId);
  const t = getNodeCenter(toId);
  // Find the best connection points on the border
  const dx = t.x - f.x;
  const dy = t.y - f.y;

  let fx, fy, tx, ty;
  // From side
  if (Math.abs(dx) * f.h > Math.abs(dy) * f.w) {
    fx = dx > 0 ? f.left + f.w : f.left;
    fy = f.y;
  } else {
    fx = f.x;
    fy = dy > 0 ? f.top + f.h : f.top;
  }
  // To side
  if (Math.abs(dx) * t.h > Math.abs(dy) * t.w) {
    tx = dx > 0 ? t.left : t.left + t.w;
    ty = t.y;
  } else {
    tx = t.x;
    ty = dy > 0 ? t.top : t.top + t.h;
  }
  return { fx, fy, tx, ty };
}

function drawEdges() {
  svgEdges.innerHTML = "";
  // Arrowhead markers
  const defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
  ["inherits", "composes", "uses", "registers"].forEach(type => {
    const marker = document.createElementNS("http://www.w3.org/2000/svg", "marker");
    marker.setAttribute("id", `arrow-${type}`);
    marker.setAttribute("viewBox", "0 0 10 10");
    marker.setAttribute("refX", "9");
    marker.setAttribute("refY", "5");
    marker.setAttribute("markerWidth", "6");
    marker.setAttribute("markerHeight", "6");
    marker.setAttribute("orient", "auto");
    const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
    poly.setAttribute("points", "0,1 10,5 0,9");
    const colors = { inherits: "#a78bfa", composes: "#60a5fa", uses: "#555570", registers: "#f87171" };
    poly.setAttribute("fill", colors[type]);
    marker.appendChild(poly);
    defs.appendChild(marker);
  });
  svgEdges.appendChild(defs);

  edges.forEach(([fromId, toId, type]) => {
    const pts = getEdgePoints(fromId, toId);
    const mx = (pts.fx + pts.tx) / 2;
    const my = (pts.fy + pts.ty) / 2;
    // Slight curve
    const dx = pts.tx - pts.fx;
    const dy = pts.ty - pts.fy;
    const cx = mx - dy * 0.08;
    const cy = my + dx * 0.08;

    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
    path.setAttribute("d", `M${pts.fx},${pts.fy} Q${cx},${cy} ${pts.tx},${pts.ty}`);
    path.classList.add(`edge-${type}`);
    path.dataset.from = fromId;
    path.dataset.to = toId;
    path.dataset.type = type;
    path.setAttribute("marker-end", `url(#arrow-${type})`);
    svgEdges.appendChild(path);
  });
}

drawEdges();

// ─── SELECTION & DETAIL PANEL ────────────────────────────────────
function getRelated(id) {
  const related = { inherits: [], inheritedBy: [], composes: [], composedBy: [], uses: [], usedBy: [], registers: [], registeredBy: [] };
  edges.forEach(([from, to, type]) => {
    if (from === id) {
      if (type === "inherits") related.inherits.push(to);
      else if (type === "composes") related.composes.push(to);
      else if (type === "uses") related.uses.push(to);
      else if (type === "registers") related.registers.push(to);
    }
    if (to === id) {
      if (type === "inherits") related.inheritedBy.push(from);
      else if (type === "composes") related.composedBy.push(from);
      else if (type === "uses") related.usedBy.push(from);
      else if (type === "registers") related.registeredBy.push(from);
    }
  });
  return related;
}

function selectNode(id) {
  if (selectedNode === id) {
    deselectNode();
    return;
  }
  selectedNode = id;
  const n = nodes.find(n => n.id === id);
  const rel = getRelated(id);
  const connectedIds = new Set([id]);
  edges.forEach(([f, t]) => {
    if (f === id || t === id) { connectedIds.add(f); connectedIds.add(t); }
  });

  // Dim unrelated
  Object.entries(nodeEls).forEach(([nid, el]) => {
    el.classList.toggle("dimmed", !connectedIds.has(nid));
    el.classList.toggle("selected", nid === id);
  });
  svgEdges.querySelectorAll("path").forEach(p => {
    p.classList.toggle("dimmed", p.dataset.from !== id && p.dataset.to !== id);
  });

  // Render detail
  let html = `<div class="detail-file">src/genfxn/${n.file}</div>`;
  html += `<h2>${n.id}</h2>`;
  html += `<div class="detail-kind">${n.badge}</div>`;
  html += `<div class="detail-desc">${n.desc}</div>`;

  if (n.fields.length) {
    html += '<div class="detail-section-title">Fields / Methods</div>';
    n.fields.forEach(f => {
      html += `<div class="detail-field-row"><span class="fname">${f.name}</span><span class="ftype">${f.type}</span></div>`;
    });
  }

  const sections = [
    ["Inherits from", rel.inherits],
    ["Subclasses", rel.inheritedBy],
    ["Composes", rel.composes],
    ["Composed by", rel.composedBy],
    ["Uses", rel.uses],
    ["Used by", rel.usedBy],
    ["Registers", rel.registers],
    ["Registered in", rel.registeredBy],
  ];
  sections.forEach(([title, items]) => {
    if (items.length === 0) return;
    html += `<div class="detail-section-title">${title}</div>`;
    items.forEach(rid => {
      const rn = nodes.find(n => n.id === rid);
      html += `<div class="detail-rel-row" data-goto="${rid}"><span class="rel-arrow">→</span> <span style="color:${rn?.color || 'var(--text)'}">${rid}</span></div>`;
    });
  });

  detailContent.innerHTML = html;
  detailPanel.classList.add("open");

  // Make relation rows clickable
  detailPanel.querySelectorAll("[data-goto]").forEach(el => {
    el.addEventListener("click", () => selectNode(el.dataset.goto));
  });
}

function deselectNode() {
  selectedNode = null;
  Object.values(nodeEls).forEach(el => { el.classList.remove("dimmed", "selected"); });
  svgEdges.querySelectorAll("path").forEach(p => p.classList.remove("dimmed"));
  detailPanel.classList.remove("open");
}

detailClose.addEventListener("click", deselectNode);
container.addEventListener("click", (e) => {
  if (e.target === container || e.target === canvas) deselectNode();
});

// ─── LEGEND FILTERING ────────────────────────────────────────────
document.querySelectorAll(".legend-item").forEach(item => {
  item.addEventListener("click", () => {
    const filter = item.dataset.filter;
    if (activeFilters.has(filter)) {
      activeFilters.delete(filter);
      item.classList.remove("dimmed");
    } else {
      activeFilters.add(filter);
      item.classList.add("dimmed");
    }
    applyFilters();
  });
});

function applyFilters() {
  const kindMap = {
    protocol: ["protocol"],
    abstract: ["abstract"],
    op: ["op", "op-leaf"],
    space: ["space", "space-leaf"],
    template: ["template"],
    registry: ["registry"],
    types: ["types"],
  };
  const hiddenKinds = new Set();
  const hiddenEdgeTypes = new Set();
  activeFilters.forEach(f => {
    if (f.startsWith("edge-")) hiddenEdgeTypes.add(f.replace("edge-", ""));
    else if (kindMap[f]) kindMap[f].forEach(k => hiddenKinds.add(k));
  });

  nodes.forEach(n => {
    nodeEls[n.id].style.display = hiddenKinds.has(n.kind) ? "none" : "";
  });
  svgEdges.querySelectorAll("path").forEach(p => {
    const fromNode = nodes.find(n => n.id === p.dataset.from);
    const toNode = nodes.find(n => n.id === p.dataset.to);
    const typeHidden = hiddenEdgeTypes.has(p.dataset.type);
    const nodeHidden = (fromNode && hiddenKinds.has(fromNode.kind)) || (toNode && hiddenKinds.has(toNode.kind));
    p.style.display = (typeHidden || nodeHidden) ? "none" : "";
  });
}

// ─── NODE DRAGGING ───────────────────────────────────────────────
let dragNode = null;
let dragStartX = 0, dragStartY = 0;
let dragNodeOrigX = 0, dragNodeOrigY = 0;
let didDrag = false;
const DRAG_THRESHOLD = 4;

Object.entries(nodeEls).forEach(([id, el]) => {
  el.addEventListener("mousedown", (e) => {
    e.stopPropagation();
    const n = nodes.find(n => n.id === id);
    dragNode = { id, el, data: n };
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragNodeOrigX = n.x;
    dragNodeOrigY = n.y;
    didDrag = false;
    el.classList.add("dragging");
  });
});

window.addEventListener("mousemove", (e) => {
  if (!dragNode) return;
  const dx = (e.clientX - dragStartX) / scale;
  const dy = (e.clientY - dragStartY) / scale;
  if (!didDrag && Math.abs(dx) + Math.abs(dy) > DRAG_THRESHOLD) {
    didDrag = true;
  }
  if (didDrag) {
    dragNode.data.x = dragNodeOrigX + dx;
    dragNode.data.y = dragNodeOrigY + dy;
    dragNode.el.style.left = dragNode.data.x + "px";
    dragNode.el.style.top = dragNode.data.y + "px";
    drawEdges();
  }
});

window.addEventListener("mouseup", (e) => {
  if (dragNode) {
    dragNode.el.classList.remove("dragging");
    if (!didDrag) {
      selectNode(dragNode.id);
    }
    dragNode = null;
  }
});

// ─── PAN & ZOOM ──────────────────────────────────────────────────
let scale = 0.85;
let panX = 40, panY = 20;
let isPanning = false;
let startX, startY;

function applyTransform() {
  canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}
applyTransform();

container.addEventListener("mousedown", (e) => {
  if (e.target.closest(".node")) return;
  isPanning = true;
  startX = e.clientX - panX;
  startY = e.clientY - panY;
  container.classList.add("dragging");
});
window.addEventListener("mousemove", (e) => {
  if (!isPanning || dragNode) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
});
window.addEventListener("mouseup", () => {
  if (isPanning) {
    isPanning = false;
    container.classList.remove("dragging");
  }
});
container.addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = container.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  panX = mx - (mx - panX) * delta;
  panY = my - (my - panY) * delta;
  scale *= delta;
  scale = Math.max(0.2, Math.min(3, scale));
  applyTransform();
}, { passive: false });

document.getElementById("zoom-in").addEventListener("click", () => { scale = Math.min(3, scale * 1.2); applyTransform(); });
document.getElementById("zoom-out").addEventListener("click", () => { scale = Math.max(0.2, scale / 1.2); applyTransform(); });
document.getElementById("zoom-fit").addEventListener("click", () => {
  scale = 0.85; panX = 40; panY = 20; applyTransform();
});
</script>
