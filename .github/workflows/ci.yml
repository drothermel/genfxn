name: ci

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  all-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Install google-java-format
        run: |
          mkdir -p "$HOME/.local/bin" "$HOME/.local/share"
          curl -sSL \
            -o "$HOME/.local/share/google-java-format-1.34.1-all-deps.jar" \
            "https://github.com/google/google-java-format/releases/download/v1.34.1/google-java-format-1.34.1-all-deps.jar"
          cat > "$HOME/.local/bin/google-java-format" <<'SH'
          #!/usr/bin/env bash
          exec java -jar "$HOME/.local/share/google-java-format-1.34.1-all-deps.jar" "$@"
          SH
          chmod +x "$HOME/.local/bin/google-java-format"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies
        run: uv sync

      - name: Run all checks (CI mode)
        run: uv run python scripts/run_all_checks.py --ci
