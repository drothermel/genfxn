name: ci

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  all-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GOOGLE_JAVA_FORMAT_VERSION: "1.34.1"
      GOOGLE_JAVA_FORMAT_SHA256: "79e1cb5c8bd698c572c0ae504d07816129b8fc06204fb49550bec83bd5ea0aa8"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache google-java-format jar
        uses: actions/cache@v4
        with:
          path: ${{ env.HOME }}/.local/share/google-java-format-${{ env.GOOGLE_JAVA_FORMAT_VERSION }}-all-deps.jar
          key: google-java-format-${{ runner.os }}-${{ env.GOOGLE_JAVA_FORMAT_VERSION }}-${{ env.GOOGLE_JAVA_FORMAT_SHA256 }}

      - name: Install google-java-format
        run: |
          mkdir -p "$HOME/.local/bin" "$HOME/.local/share"
          JAR_PATH="$HOME/.local/share/google-java-format-${GOOGLE_JAVA_FORMAT_VERSION}-all-deps.jar"
          if [ ! -f "$JAR_PATH" ]; then
            curl -sSL \
              -o "$JAR_PATH" \
              "https://github.com/google/google-java-format/releases/download/v${GOOGLE_JAVA_FORMAT_VERSION}/google-java-format-${GOOGLE_JAVA_FORMAT_VERSION}-all-deps.jar"
          fi
          echo "${GOOGLE_JAVA_FORMAT_SHA256}  $JAR_PATH" | sha256sum --check --status
          cat > "$HOME/.local/bin/google-java-format" <<SH
          #!/usr/bin/env bash
          exec java -jar "$JAR_PATH" "\$@"
          SH
          chmod +x "$HOME/.local/bin/google-java-format"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync dependencies
        run: uv sync
